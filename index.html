<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>漂流傘</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    @font-face {
      font-family: 'MyHandFont';
      src: url('./AaJinRiHuaQing-ChunLanMaoKun.ttf') format('truetype');
    }

    body {
      margin: 0;
      font-family: 'MyHandFont', "Noto Sans TC", sans-serif;
      background: #f7f3ef;
      color: #333;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* Home */
    #home {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      /* ⭐改這裡 */
      align-items: center;

      text-align: center;

      transform: translateY(30px);
      opacity: 0;
      transition: transform 0.9s ease, opacity 0.9s ease;

      padding-top: 90px;
      /* ⭐整體往上但保留呼吸 */
    }



    #home.show {
      transform: translateY(0);
      opacity: 1;
    }

    .page {
      display: none;
      min-height: 100vh;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .page.active {
      display: flex;
      flex-direction: column;
    }


    /* HOME 特別調整（字更大） */
    #home h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    #home .subtitle {
      font-size: 20px;
      margin-bottom: 25px;
      color: #666;
    }

    /* 卡片更舒服 */
    .hero {
      font-size: 16px;
      line-height: 1.9;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255, 253, 249, 0.92);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      margin-bottom: 28px;
      max-width: 320px;
    }

    /* HOME 按鈕升級 */
    #home button {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, #5c7c89, #3f5f6b);
      color: white;
      box-shadow: 0 10px 20px rgba(92, 124, 137, 0.25);
      margin-top: 12px;
    }

    /* hover */
    #home button:hover {
      transform: translateY(-2px);
    }


    /* =========================
⬅️ 左上角返回鍵（全局統一）
========================= */
    .back-btn {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 999;

      width: 40px;
      height: 40px;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 22px;
      font-weight: bold;

      color: #3f3f3f;

      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);

      border: 1px solid rgba(0, 0, 0, 0.06);

      border-radius: 50%;

      box-shadow:
        0 10px 25px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);

      cursor: pointer;

      transition: all 0.2s ease;
    }

    .back-btn:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.9);
    }

    .back-btn:active {
      transform: scale(0.95);
    }

    /* =========================
🌙 FORM 升級（手帳卡片）
========================= */

    #form .card {
      width: 100%;
      max-width: 340px;
      padding: 22px;
      border-radius: 22px;

      background: rgba(255, 253, 249, 0.95);
      backdrop-filter: blur(8px);

      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);

      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 表單標題感 */
    #form .card::before {
      content: "留下你的故事";
      font-size: 32px;
      font-weight: 600;
      color: #444;
      margin-bottom: 12px;
      text-align: center;
      /* ⭐置中 */
    }

    /* input 升級 */
    #form input,
    #form textarea {
      width: 100%;
      padding: 12px 14px;

      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.08);

      background: rgba(255, 255, 255, 0.8);

      font-size: 14px;

      transition: all 0.2s ease;
    }

    /* focus 狀態 */
    #form input:focus,
    #form textarea:focus {
      outline: none;
      border-color: #5c7c89;
      box-shadow: 0 0 0 3px rgba(92, 124, 137, 0.15);
    }

    /* textarea 拉開 */
    #form textarea {
      min-height: 120px;
      resize: none;
    }

    /* 送出按鈕升級 */
    #form button:not(.back-btn) {
      margin-top: 8px;
      padding: 13px;

      border-radius: 14px;
      border: none;

      font-size: 15px;
      font-weight: 600;

      background: linear-gradient(135deg, #5c7c89, #3f5f6b);
      color: white;

      box-shadow: 0 10px 20px rgba(92, 124, 137, 0.25);

      transition: all 0.2s ease;
    }

    #form button:hover {
      transform: translateY(-2px);
    }

    #form button:active {
      transform: scale(0.98);
    }

    /* status 字 */
    #status {
      font-size: 12px;
      color: #777;
      margin-top: 4px;
      text-align: center;
      /* ⭐置中 */
    }

    /* 表單進場動畫 */
    #form .card {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    #form.show .card {
      opacity: 1;
      transform: translateY(0);
    }

    /* 🕰️ 時光膠囊（上下滑但密集） */
    #timeline,
    #form {
      justify-content: center;
      align-items: center;
    }

    /* timeline 卡片區不貼邊 */

    .timeline {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 40px;
    }

    .message-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);

      padding: 18px 16px;
      border-radius: 18px;

      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);

      transition: all 0.25s ease;

      position: relative;
      overflow: hidden;
    }

    .message-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.12);
    }

    .message-card .mood {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #3f5f6b;
    }

    .message-card .text {
      font-size: 17px;
      line-height: 1.8;
      color: #333;
      margin-bottom: 10px;
    }

    .message-card .ig {
      margin-top: 8px;
      font-size: 13px;
      color: #5c7c89;
      font-weight: 500;
    }

    .message-card .time {
      font-size: 12px;
      color: #888;
      text-align: right;
    }

    .message-card {
      animation: floatIn 0.6s ease both;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;

      width: 4px;
      height: 100%;

      background: linear-gradient(#5c7c89, transparent);

      opacity: 0.6;
    }


    /* =========================
🌧️ 開場頁（重點頁）
========================= */
    html.intro-mode,
    body.intro-mode {
      background: #0b1b2b;
    }

    #intro {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      inset: 0;
      z-index: 9999;
    }

    /* 背景大圖（左右滿版） */
    .intro-wrap {
      width: 100%;
      height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      position: relative;

      /* 🌌 深藍底色（你要的） */
      background: #0b1b2b;

      /* 如果圖片存在會疊上去 */
      background-image:
        linear-gradient(rgba(11, 27, 43, 0.6), rgba(11, 27, 43, 0.6)),
        url('./IMG_2677.PNG');

      background-size: cover;
      background-position: center;
    }


    /* 黑色雨夜遮罩（讓字看得清楚） */
    .intro-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(20, 30, 40, 0.224);
    }

    /* 文字區 */
    .intro-text {
      position: relative;
      text-align: center;
      color: #fff;
      z-index: 2;

      margin-bottom: 30px;
    }

    .intro-text h2 {
      font-size: 40px;
      margin: 0;
      letter-spacing: 2px;
    }

    .intro-text p {
      margin: 6px 0;
      font-size: 32px;
    }

    .intro-text .small {
      font-size: 20px;
      opacity: 0.8;
      margin-top: 10px;
    }

    /* 按鈕（底部） */
    .intro-btn {
      position: relative;
      z-index: 2;

      width: 70%;
      max-width: 260px;

      background: #F4A261;
      color: #1F2A37;

      border: none;
      padding: 14px;
      border-radius: 14px;

      font-weight: bold;
    }

    /* =========================
🌧️ 真實雨滴（修正版）
========================= */

    .rain {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    /* 雨滴本體 */
    .rain span {
      position: absolute;
      bottom: 100%;
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, 0.35);
      animation: fall linear infinite;
      border-radius: 2px;
    }

    /* 動畫 */
    @keyframes fall {
      0% {
        transform: translateY(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translateY(120vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- 🌧️ 開場頁 -->
    <div id="intro">
      <div class="intro-wrap">

        <div class="intro-text">
          <h2>今天雨很大</h2>
          <p>這把傘借你</p>
          <p class="small">但作為交換，請留下一個故事</p>
        </div>

        <button class="intro-btn" onclick="enterApp()">
          撐開這把傘
        </button>

        <!-- 🌧️ 雨滴層 -->
        <div class="rain"></div>


      </div>
    </div>

    <!-- 🌙 首頁 -->
    <div id="home" class="page">
      <h1>漂流傘</h1>
      <p class="subtitle">一把被陌生人接力撐過的傘</p>

      <div class="card hero" id="journey">
        載入中...
      </div>

      <button onclick="goPage('timeline')">查看時光膠囊</button>
      <button onclick="goPage('form')">留下你的故事</button>
    </div>

    <!-- 🕰️ 時光膠囊 -->
    <div id="timeline" class="page">
      <button class="back-btn" onclick="goPage('home')">‹</button>

      <div class="timeline" id="messages"></div>
    </div>

    <!-- 📝 表單 -->
    <div id="form" class="page">
      <button class="back-btn" onclick="goPage('home')">‹</button>

      <div class="card">
        <input id="mood" placeholder="現在的心情...">
        <textarea id="message" placeholder="這一刻，你在想什麼？"></textarea>
        <input id="instagram" placeholder="IG（選填）">

        <button onclick="submitData()">把故事交給這把傘</button>
        <p id="status"></p>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzql5ah0RWgszDkny1_bG2VJLsGqy8ng2S4Cu4YoeLQLDzBMgtqEm07zqFXPB0KsigE/exec";
    const SHEET_API = "https://opensheet.elk.sh/1A5k99fbXf9kFppiZBPSUBy6l8TGGDudqwtB9DA5Suws/data";

    /* 切頁 */
    function goPage(pageId) {

      // ❗先關 intro
      const intro = document.getElementById("intro");
      if (intro) intro.style.display = "none";

      // ❗強制關掉所有 page
      document.querySelectorAll(".page").forEach(p => {
        p.classList.remove("active");
        p.style.display = "none";
      });

      // ❗打開目標 page
      const target = document.getElementById(pageId);
      target.classList.add("active");
      target.style.display = "flex";

      if (pageId === "home") loadJourney();
      if (pageId === "timeline") loadMessages();
      // 表單進場動畫
      if (pageId === "form") {
        setTimeout(() => {
          document.getElementById("form").classList.add("show");
        }, 50);
      } else {
        document.getElementById("form").classList.remove("show");
      }

    }


    function enterApp() {
      const intro = document.getElementById("intro");

      intro.style.transition = "opacity 0.8s ease";
      intro.style.opacity = 0;

      // ⭐離開 intro mode
      document.documentElement.classList.remove("intro-mode");
      document.body.classList.remove("intro-mode");

      setTimeout(() => {
        intro.style.display = "none";

        goPage("home");

        const home = document.getElementById("home");
        home.classList.add("show");

      }, 800);
    }



    /* ☂️ 首頁 */
    async function loadJourney() {
      const res = await fetch(SHEET_API);
      const data = await res.json();

      const total = data.length;
      const moods = [...new Set(data.map(d => d.mood).filter(Boolean))];

      document.getElementById("journey").innerHTML = `
    這把傘已經走過 <b>${total}</b> 次旅程。<br><br>
    有人在深夜失眠時撐過它，<br>
    有人在雨停之後把它交給下一個人。<br><br>
    它聽過：${moods.slice(0, 6).join("、")}...
  `;
    }

    /* 🕰️ 時光膠囊 */
    async function loadMessages() {
      const res = await fetch(SHEET_API);
      const data = await res.json();

      const container = document.getElementById("messages");
      container.innerHTML = "";

      data.reverse().slice(0, 20).forEach(item => {
        const card = document.createElement("div");
        card.className = "message-card";

        card.innerHTML = `
  <div class="mood">${item.mood || ""}</div>
  <div class="text">${item.message || ""}</div>

  ${item.instagram ? `
    <div class="ig">${item.instagram}</div>
  ` : ""}

  <div class="time">${item.timestamp || ""}</div>
`;

        container.appendChild(card);
      });
    }

    /* ✉️ 送出 */
    async function submitData() {
      const mood = document.getElementById("mood").value;
      const message = document.getElementById("message").value;
      const instagram = document.getElementById("instagram").value;

      const status = document.getElementById("status");

      if (!mood || !message) {
        status.innerText = "請寫點什麼再走吧 ☁️";
        return;
      }

      status.innerText = "☔ 傘正在記住...";

      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ mood, message, instagram })
      });

      status.innerText = "🌙 已被收藏";

      document.getElementById("mood").value = "";
      document.getElementById("message").value = "";
      document.getElementById("instagram").value = "";

      loadJourney();
    }

    /* 初始化 */
    loadJourney();


    function createRain() {
      const rain = document.querySelector(".rain");

      for (let i = 0; i < 80; i++) {
        const drop = document.createElement("span");

        drop.style.left = Math.random() * 100 + "%";
        drop.style.animationDuration = (0.4 + Math.random() * 0.6) + "s";
        drop.style.opacity = Math.random();
        drop.style.height = (10 + Math.random() * 15) + "px";

        rain.appendChild(drop);
      }
    }
    createRain();

    document.documentElement.classList.add("intro-mode");
    document.body.classList.add("intro-mode");

  </script>

</body>

</html>
