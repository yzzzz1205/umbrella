<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>漂流傘</title>

  <!-- 引入思源黑體與 FontAwesome 圖標 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      /* 移除手機點擊藍色陰影 */
    }

    @font-face {
      font-family: 'MyHandFont';
      src: url('./AaJinRiHuaQing-ChunLanMaoKun.ttf') format('truetype');
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #intro {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }

    body.intro-mode {
      background: #0b1b2b;
    }

    html.intro-mode,
    body.intro-mode {
      background: #0b1b2b;
      overflow: hidden;
    }

    /* 確保全域背景完全一致，消除手機邊緣與中間的色差 */
    body {
      margin: 0;
      font-family: 'MyHandFont', "Noto Sans TC", sans-serif;
      background: #f7f3ef;
      /* 絕對一致的溫潤燕麥色 */
      color: #333;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 420px;
      margin: auto;
      min-height: 100vh;
      position: relative;
      z-index: 1;
      background: #f7f3ef;
      /* 容器也強制與整體背景色完全一致 */
    }

    /* 統一頁面基礎樣式與高質感切換動畫 */
    .page {
      display: none;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s cubic-bezier(0.25, 1, 0.5, 1), transform 0.45s cubic-bezier(0.25, 1, 0.5, 1);
      min-height: 100vh;
      width: 100%;
      background: #f7f3ef;
      /* 確保所有子頁面背景完全一致 */
    }

    .page.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* =========================
    🌙 HOME 升級美化版
    ========================= */
    #home {
      position: relative;
      overflow: hidden;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
      background: #f7f3ef;
      /* 嚴格與底色一致，完全不採用會產生邊緣色差的漸層 */
      text-align: center;
    }

    /* 首頁頂部區域 */
    .home-header {
      position: relative;
      z-index: 2;
      margin-bottom: 24px;
    }

    /* 還原原本的傘圖標與經典動畫 */
    .umbrella-icon {
      font-size: 56px;
      margin-bottom: 8px;
      animation: umbrellaFloat 3.5s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes umbrellaFloat {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-10px) rotate(5deg);
      }
    }

    /* 標題與副標 */
    #home h1 {
      font-size: 40px;
      margin: 0 0 8px 0;
      letter-spacing: 5px;
      color: #2f3e46;
      text-shadow: 0 2px 8px rgba(92, 124, 137, 0.08);
    }

    #home .subtitle {
      font-size: 15px;
      color: #6b7a82;
      margin: 0;
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* 升級：手帳風格主卡片 */
    .hero {
      position: relative;
      z-index: 2;
      font-family: "Noto Sans TC", sans-serif;
      width: 100%;
      max-width: 340px;
      font-size: 15px;
      line-height: 1.8;
      padding: 24px;
      border-radius: 24px;
      background: #ffffff;
      /* 純白紙張感 */
      border: 2px dashed rgba(92, 124, 137, 0.25);
      /* 復古手帳虛線縫線 */
      box-shadow: 0 12px 30px rgba(140, 130, 122, 0.08);
      /* 柔和紙張陰影 */
      margin-bottom: 28px;
      text-align: left;
    }

    /* 卡片左側的小布標裝飾，增添手帳細節 */
    .hero::before {
      content: "STORY";
      position: absolute;
      left: -8px;
      top: 10px;
      background: #5c7c89;
      color: #ffffff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px 4px 4px 0;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.05);
    }

    /* 動態數字突顯 */
    .highlight-num {
      font-size: 28px;
      font-weight: 700;
      color: #3f5f6b;
      margin: 0 4px;
      display: inline-block;
      border-bottom: 2px solid rgba(92, 124, 137, 0.3);
      line-height: 1;
    }

    /* 按鈕區美化 */
    .home-actions {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 2;
    }

    .home-actions button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      font-family: "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, #5c7c89, #3f5f6b);
      box-shadow: 0 8px 20px rgba(92, 124, 137, 0.18);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* 微光澤與點擊效果 */
    .home-actions button:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(92, 124, 137, 0.12);
      filter: brightness(0.95);
    }

    /* 極柔和雨滴背景點綴（完全不影響邊緣色調） */
    .floating-rain::before,
    .floating-rain::after {
      content: "";
      position: absolute;
      width: 1.5px;
      height: 60px;
      background: linear-gradient(transparent, rgba(92, 124, 137, 0.15), transparent);
      animation: rainMove 6s linear infinite;
      pointer-events: none;
    }

    .floating-rain::before {
      left: 8%;
      top: -10%;
    }

    .floating-rain::after {
      right: 8%;
      top: -20%;
      animation-delay: 3s;
    }

    @keyframes rainMove {
      to {
        transform: translateY(120vh);
      }
    }

    /* =========================
    ⬅️ 左上角返回鍵（手機觸控優化）
    ========================= */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 99;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #4a5568;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      box-shadow: 0 4px 12px rgba(165, 150, 135, 0.1);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .back-btn:active {
      transform: scale(0.9);
    }

    /* =========================
    🕰️ 時光膠囊 升級版
    ========================= */
    #timeline {
      flex-direction: column;
      align-items: center;
      padding: 84px 20px 40px 20px;
      background: #f7f3ef;
      /* 強制底色完全一致 */
    }

    .timeline {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-card {
      background: #ffffff;
      padding: 20px;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(165, 150, 135, 0.08);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .message-card .mood {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 10px;
      background: rgba(92, 124, 137, 0.1);
      color: #3f5f6b;
      margin-bottom: 12px;
      font-family: "Noto Sans TC", sans-serif;
    }

    .message-card .text {
      font-size: 16px;
      line-height: 1.7;
      color: #333;
      margin-bottom: 14px;
      word-wrap: break-word;
    }

    .message-card .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px dashed rgba(0, 0, 0, 0.06);
      padding-top: 10px;
      font-family: "Noto Sans TC", sans-serif;
    }

    .message-card .ig {
      font-size: 13px;
      color: #5c7c89;
      font-weight: 500;
    }

    .message-card .time {
      font-size: 11px;
      color: #999;
    }

    .message-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, #5c7c89, transparent);
    }

    /* =========================
    📝 FORM 留下故事 升級版
    ========================= */
    #form {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 70px 24px 40px 24px;
      background: #f7f3ef;
      /* 強制底色完全一致 */
    }

    #form .card {
      width: 100%;
      max-width: 340px;
      padding: 26px 20px;
      border-radius: 26px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(165, 150, 135, 0.1);
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .form-title {
      font-size: 30px;
      font-weight: 600;
      color: #2f3e46;
      text-align: center;
      margin-bottom: 4px;
    }

    .mood-presets {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .mood-tag {
      font-size: 15px;
      padding: 10px 16px;
      background: rgba(92, 124, 137, 0.1);
      border-radius: 999px;
      cursor: pointer;
      color: #4c5d66;
      font-family: "Noto Sans TC", sans-serif;
      transition: all 0.25s ease;
      border: 1px solid rgba(92, 124, 137, 0.08);
    }

    /* hover */
    .mood-tag:hover {
      transform: translateY(-2px);

      background: rgba(92, 124, 137, 0.18);
    }

    /* 點擊 */
    .mood-tag:active {
      transform: scale(0.96);

      background: #5c7c89;

      color: white;
    }

    #form input,
    #form textarea {
      width: 100%;
      padding: 13px 15px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: #fafaf9;
      font-size: 15px;
      font-family: "Noto Sans TC", sans-serif;
      transition: all 0.25s ease;
      outline: none;
    }

    #form input:focus,
    #form textarea:focus {
      border-color: #5c7c89;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(92, 124, 137, 0.1);
    }

    #form textarea {
      min-height: 120px;
      resize: none;
    }

    #form button:not(.back-btn) {
      margin-top: 6px;
      padding: 14px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      font-family: "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, #5c7c89, #3f5f6b);
      color: white;
      box-shadow: 0 8px 20px rgba(92, 124, 137, 0.2);
    }

    #form button:not(.back-btn):active {
      transform: scale(0.97);
    }

    #status {
      font-size: 13px;
      color: #666;
      margin: 2px 0 0 0;
      text-align: center;
      font-family: "Noto Sans TC", sans-serif;
    }

    /* =========================
    🌧️ 開場頁（保持您的浪漫大圖底色）
    ========================= */
    html.intro-mode,
    body.intro-mode {
      background: #0b1b2b;
    }

    #intro {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      inset: 0;
      z-index: 9999;
    }

    .intro-wrap {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #0b1b2b;
      background-image:
        linear-gradient(rgba(11, 27, 43, 0.6), rgba(11, 27, 43, 0.6)),
        url('./IMG_2677.PNG');
      background-size: cover;
      background-position: center;
    }

    .intro-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(20, 30, 40, 0.224);
    }

    .intro-text {
      position: relative;
      text-align: center;
      color: #fff;
      z-index: 2;
      margin-bottom: 30px;
    }

    .intro-text h2 {
      font-size: 40px;
      margin: 0;
      letter-spacing: 2px;
    }

    .intro-text p {
      margin: 6px 0;
      font-size: 32px;
    }

    .intro-text .small {
      font-size: 20px;
      opacity: 0.8;
      margin-top: 10px;
    }

    .intro-btn {
      position: relative;
      z-index: 2;
      font-size: 15px;
      width: 70%;
      max-width: 260px;
      background: #F4A261;
      color: #1F2A37;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-weight: bold;
    }

    .rain {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .rain span {
      position: absolute;
      bottom: 100%;
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, 0.35);
      animation: fall linear infinite;
      border-radius: 2px;
    }

    @keyframes fall {
      0% {
        transform: translateY(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translateY(120vh);
        opacity: 0;
      }
    }

    /* =========================
🧠 心理測驗頁
========================= */
    #quizPage {
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: #f7f3ef;
      min-height: 100vh;
    }

    #quizPage .result-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .quiz-card {
      width: 100%;
      max-width: 360px;
      padding: 30px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      box-shadow:
        0 20px 50px rgba(165, 150, 135, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.04);

      border: 1px solid rgba(255, 255, 255, 0.7);

      display: flex;
      flex-direction: column;
    }

    .quiz-subtitle {
      text-align: center;
      color: #7b8790;
      font-size: 14px;
      margin-top: -4px;
      margin-bottom: 26px;
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 1.6;
    }

    /* 題目區塊 */
    .quiz-question {
      margin-bottom: 26px;
    }

    .quiz-question-title {
      font-size: 16px;
      margin-bottom: 14px;
      color: #2f3e46;
      line-height: 1.5;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 600;
    }

    /* 選項 */
    .quiz-option {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(92, 124, 137, 0.06);
      border: 1px solid rgba(92, 124, 137, 0.08);

      margin-bottom: 10px;

      transition: all 0.22s ease;

      cursor: pointer;

      font-family: 'Noto Sans TC', sans-serif;
      color: #334155;
    }

    .quiz-option:hover {
      transform: translateY(-2px);
      background: rgba(92, 124, 137, 0.1);
    }

    .quiz-option.active {
      background: rgba(92, 124, 137, 0.18);
      border: 1px solid rgba(92, 124, 137, 0.25);

      box-shadow:
        0 6px 14px rgba(92, 124, 137, 0.12);
    }

    /* 測驗按鈕 */
    .quiz-submit-btn {
      margin-top: 10px;
      padding: 15px;
      border: none;
      border-radius: 18px;

      background: linear-gradient(135deg, #5c7c89, #3f5f6b);

      color: white;
      font-size: 16px;
      font-weight: 600;

      font-family: 'Noto Sans TC', sans-serif;

      box-shadow:
        0 10px 24px rgba(92, 124, 137, 0.2);

      transition: all 0.2s ease;
    }

    .quiz-submit-btn:active {
      transform: scale(0.97);
    }

    /* 結果頁 */
    #resultPage {
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
    }

    .result-wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #resultImage {
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .save-tip {
      margin-top: 14px;
      font-size: 14px;
      color: #777;
      font-family: "Noto Sans TC", sans-serif;
    }


    /* 按鈕區美化 */
    .result-buttons {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 2;
    }

    .result-buttons button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      font-family: "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, #5c7c89, #3f5f6b);
      box-shadow: 0 8px 20px rgba(92, 124, 137, 0.18);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* 微光澤與點擊效果 */
    .result-buttons button:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(92, 124, 137, 0.12);
      filter: brightness(0.95);
    }


    .quiz-mini {
      margin-top: 18px;
      font-size: 15px;
      color: #6b7a82;
      opacity: 0.8;
      cursor: pointer;
    }

    .quiz-mini:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <!-- 🌧️ 開場頁 -->
  <div id="intro">
    <div class="intro-wrap">
      <div class="intro-text">
        <h2>今天雨很大</h2>
        <p>這把傘借你</p>
        <p class="small">但作為交換，請留下一個故事</p>
      </div>
      <button class="intro-btn" onclick="enterApp()">撐開這把傘</button>
      <div class="rain"></div>
    </div>
  </div>
  <div class="container">
    <!-- 🌙 首頁 (升級美化版) -->
    <div id="home" class="page">
      <div class="floating-rain"></div>

      <div class="home-header">
        <!-- 還原原本的傘圖標 ☂ -->
        <div class="umbrella-icon">☂</div>
        <h1>漂流傘</h1>
        <p class="subtitle">一把被陌生人接力撐過的傘</p>
      </div>

      <!-- 精緻手帳卡片 -->
      <div class="card hero" id="journey">
        正在回憶旅程...
      </div>

      <div class="home-actions">
        <button onclick="goPage('timeline')">
          <i class="fa-solid fa-hourglass-half"></i> 查看時光膠囊
        </button>
        <button onclick="goPage('form')">
          <i class="fa-solid fa-pen-nib"></i> 留下你的故事
        </button>
      </div>
      <div class="quiz-mini" onclick="goPage('quizPage')">
        雨天人格測驗（點我玩）
      </div>
    </div>

    <!-- 🕰️ 時光膠囊 -->
    <div id="timeline" class="page">
      <button class="back-btn" onclick="goPage('home')">‹</button>
      <div class="timeline" id="messages"></div>
    </div>

    <!-- 📝 表單 -->
    <div id="form" class="page">
      <button class="back-btn" onclick="goPage('home')">‹</button>

      <div class="card">
        <div class="form-title">留下你的故事</div>

        <!-- 手機貼近心情快捷鍵 -->
        <div class="mood-presets">
          <div class="mood-tag" onclick="quickMood('🌧️ 難過')">🌧️ 難過</div>
          <div class="mood-tag" onclick="quickMood('🌙 孤單')">🌙 孤單</div>
          <div class="mood-tag" onclick="quickMood('✨ 還不錯')">✨ 還不錯</div>
          <div class="mood-tag" onclick="quickMood('💤 好想睡')">💤 好想睡</div>
          <div class="mood-tag" onclick="quickMood('🍃 平靜')">🍃 平靜</div>
          <div class="mood-tag" onclick="quickMood('🍀 幸運')">🍀 幸運</div>
        </div>

        <input id="mood" placeholder="現在的心情...（或點選上方標籤）">
        <textarea id="message" placeholder="這一刻，你在想什麼？"></textarea>
        <input id="instagram" placeholder="IG（選填，留給想認識你的人）">

        <button onclick="submitData()">把故事交給這把傘</button>
        <p id="status"></p>
      </div>
    </div>
    <!-- 🧠 心理測驗頁 -->
    <div id="quizPage" class="page">

      <div class="result-wrap">

        <div class="quiz-card">

          <div class="form-title">
            雨中的你
          </div>

          <p class="quiz-subtitle">
            回答幾個問題，看看這把傘讀懂了什麼
          </p>

          <div id="quizContainer"></div>

          <button class="quiz-submit-btn" onclick="showResult()">
            看看我的雨天人格
          </button>

        </div>

      </div>

    </div>

    <!-- 🌧 人格結果頁 -->
    <div id="resultPage" class="page">

      <div class="result-wrap">

        <img id="resultImage" src="" alt="人格圖卡">

        <p class="save-tip">
          長按圖片即可儲存 ☔
        </p>

        <div class="result-buttons">
          <button onclick="goPage('timeline')">
            <i class="fa-solid fa-hourglass-half"></i> 查看時光膠囊
          </button>

          <button onclick="goPage('home')">
            <i class="fa-solid fa-house"></i>
            回到首頁
          </button>
          <button onclick="shareResultIG()">
            <i class="fa-solid fa-share-nodes"></i> 分享到社群
          </button>

          <button onclick="downloadResult()">
            <i class="fa-solid fa-download"></i> 下載圖片
          </button>

          <button onclick="copyCaption()">
            <i class="fa-solid fa-clipboard"></i> 複製IG文案
          </button>
        </div>

      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzql5ah0RWgszDkny1_bG2VJLsGqy8ng2S4Cu4YoeLQLDzBMgtqEm07zqFXPB0KsigE/exec";
    const SHEET_API = "https://opensheet.elk.sh/1A5k99fbXf9kFppiZBPSUBy6l8TGGDudqwtB9DA5Suws/data";

    /* 切頁優化：加入流暢動畫 */
    function goPage(pageId) {
      const intro = document.getElementById("intro");
      if (intro) intro.style.display = "none";

      // 關閉目前所有頁面
      document.querySelectorAll(".page").forEach(p => {
        p.classList.remove("show");
        p.style.display = "none";
      });

      // 顯示目標頁面
      const target = document.getElementById(pageId);
      target.style.display = "flex";

      // 透過 setTimeout 觸行動態延遲，確保 CSS 過渡動畫能順利執行
      setTimeout(() => {
        target.classList.add("show");
      }, 30);

      if (pageId === "home") loadJourney();
      if (pageId === "timeline") loadMessages();
      if (pageId === "quizPage") loadQuiz();
    }

    function enterApp() {
      const intro = document.getElementById("intro");
      intro.style.transition = "opacity 0.6s ease";
      intro.style.opacity = 0;

      document.documentElement.classList.remove("intro-mode");
      document.body.classList.remove("intro-mode");

      setTimeout(() => {
        intro.style.display = "none";
        goPage("home");
      }, 600);
    }

    /* 心情快捷輸入 */
    function quickMood(text) {
      document.getElementById("mood").value = text;
    }

    /* ☂️ 首頁數據視覺化優化 */
    async function loadJourney() {
      try {
        const res = await fetch(SHEET_API);
        const data = await res.json();

        const total = data.length;
        const moods = [...new Set(data.map(d => d.mood).filter(Boolean))];

        document.getElementById("journey").innerHTML = `
          這把傘已經走過 <span class="highlight-num">${total}</span> 次旅程。<br><br>
          有人在深夜失眠時撐過它，<br>
          有人在雨停之後把它交給下一個人。<br><br>
          它曾聽過：<span style="color:#5c7c89; font-weight:500;">${moods.slice(0, 5).join("、")}...</span>
        `;
      } catch (e) {
        document.getElementById("journey").innerText = "這把傘正在聆聽世界，稍後再試。";
      }
    }

    /* 🕰️ 時光膠囊卡片優化 */
    async function loadMessages() {
      try {
        const res = await fetch(SHEET_API);
        const data = await res.json();

        const container = document.getElementById("messages");
        container.innerHTML = "";

        data.reverse().slice(0, 20).forEach(item => {
          const card = document.createElement("div");
          card.className = "message-card";

          card.innerHTML = `
            <div class="mood">${item.mood || "無特定心情"}</div>
            <div class="text">${item.message || ""}</div>
            <div class="card-footer">
              <div class="ig">${item.instagram ? `@${item.instagram}` : "☂ 匿名旅人"}</div>
              <div class="time">${item.timestamp || ""}</div>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        document.getElementById("messages").innerText = "無法載入時光膠囊 ☁️";
      }
    }
    /* =========================
    🧠 心理測驗題目
    ========================= */

    const quizQuestions = [
      {
        question: "如果突然下雨，你通常會？",
        options: [
          { text: "找地方躲起來等雨停", type: "cloudy", weight: 2 },
          { text: "慢慢走，享受雨聲", type: "drizzle", weight: 3 },
          { text: "撐著傘快速離開", type: "storm", weight: 1 },
          { text: "覺得有點浪漫", type: "shower", weight: 2 },
          { text: "反而更開心空氣變好", type: "sunny", weight: 3 }
        ]
      },

      {
        question: "你最常把情緒藏在哪裡？",
        options: [
          { text: "爆發前的沉默", type: "storm", weight: 3 },
          { text: "日常的小細節", type: "drizzle", weight: 2 },
          { text: "不被注意的角落", type: "cloudy", weight: 3 },
          { text: "忽冷忽熱的互動", type: "shower", weight: 2 },
          { text: "看起來很正常的笑容", type: "sunny", weight: 1 }
        ]
      },

      {
        question: "現在的你，比較像哪種天氣？",
        options: [
          { text: "暴雨（很滿、很亂）", type: "storm", weight: 3 },
          { text: "毛毛雨（穩定但持續）", type: "drizzle", weight: 3 },
          { text: "陰天（不明確）", type: "cloudy", weight: 3 },
          { text: "陣雨（情緒波動）", type: "shower", weight: 3 },
          { text: "晴天（穩定舒服）", type: "sunny", weight: 3 }
        ]
      },

      {
        question: "你最害怕的是？",
        options: [
          { text: "情緒失控", type: "storm", weight: 3 },
          { text: "沒有人真正懂你", type: "drizzle", weight: 3 },
          { text: "長時間的空白感", type: "cloudy", weight: 3 },
          { text: "關係忽遠忽近", type: "shower", weight: 3 },
          { text: "失去現在的平靜", type: "sunny", weight: 2 }
        ]
      },

      {
        question: "如果有人替你撐傘，你會？",
        options: [
          { text: "忍不住想哭", type: "storm", weight: 2 },
          { text: "默默記在心裡", type: "drizzle", weight: 3 },
          { text: "不知道怎麼回應", type: "cloudy", weight: 2 },
          { text: "一下靠近一下退開", type: "shower", weight: 3 },
          { text: "也想成為撐傘的人", type: "sunny", weight: 3 }
        ]
      }
    ];
    /* ✉️ 送出故事 */
    async function submitData() {
      const mood = document.getElementById("mood").value;
      const message = document.getElementById("message").value;
      const instagram = document.getElementById("instagram").value;
      const status = document.getElementById("status");

      if (!mood || !message) {
        status.innerText = "請填寫心情與故事再走吧 ☁️";
        return;
      }

      status.innerText = "☔ 傘正在記住你的故事...";

      try {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ mood, message, instagram })
        });

        status.innerText = "🌙 故事已被妥善收藏";

        document.getElementById("mood").value = "";
        document.getElementById("message").value = "";
        document.getElementById("instagram").value = "";

        setTimeout(() => {

          loadQuiz();

          goPage("quizPage");

        }, 1200);

      } catch (e) {
        status.innerText = "好像斷線了，請再試一次 ☕";
      }
    }
    let selectedAnswers = [];

    /* 產生測驗 */
    function loadQuiz() {

      selectedAnswers = [];

      const container = document.getElementById("quizContainer");

      container.innerHTML = "";

      quizQuestions.forEach((q, index) => {

        const block = document.createElement("div");

        block.className = "quiz-question";

        block.innerHTML = `
<div class="quiz-question-title">
        ${index + 1}. ${q.question}
      </div>
    `;

        q.options.forEach(option => {

          const btn = document.createElement("div");

          btn.className = "quiz-option";

          btn.style.marginBottom = "8px";

          btn.innerHTML = `
        <div class="rain-name">${option.text}</div>
      `;

          btn.onclick = () => {

            selectedAnswers[index] = option.type;

            block.querySelectorAll(".rain-option").forEach(el => {
              el.style.background = "rgba(92,124,137,0.06)";
              el.style.border = "1px solid rgba(92,124,137,0.08)";
            });

            block.querySelectorAll(".quiz-option").forEach(el => {
              el.classList.remove("active");
            });

            btn.classList.add("active");
          };

          block.appendChild(btn);
        });

        container.appendChild(block);
      });
    }
    /* 顯示測驗結果 */
    function showResult() {

      if (selectedAnswers.length < quizQuestions.length) {
        alert("還有問題沒回答 ☔");
        return;
      }

      const score = {
        storm: 0,
        drizzle: 0,
        cloudy: 0,
        shower: 0,
        sunny: 0
      };

      selectedAnswers.forEach((type, index) => {
        const q = quizQuestions[index];

        const selectedOption = q.options.find(o => o.type === type);

        if (selectedOption) {
          score[type] += selectedOption.weight || 1;
        }
      });

      const resultType = Object.keys(score).reduce((a, b) =>
        score[a] > score[b] ? a : b
      );

      const imageMap = {
        storm: "./storm.JPG",
        drizzle: "./drizzle.JPG",
        cloudy: "./cloudy.JPG",
        shower: "./shower.JPG",
        sunny: "./sunny.JPG"
      };

      document.getElementById("resultImage").src =
        imageMap[resultType];

      goPage("resultPage");
    }
    /*分享社群*/
    async function shareResultIG() {
      const img = document.getElementById("resultImage");

      try {
        const res = await fetch(img.src);
        const blob = await res.blob();
        const file = new File([blob], "rain-result.jpg", { type: "image/jpeg" });

        const caption = `我在《漂流傘》測出的雨天人格 ☔\n\n你也來試試看你的天氣是哪一種？`;

        // 原生分享（手機最強）
        if (navigator.share && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: "雨天人格測驗",
            text: caption,
            files: [file]
          });
        } else {
          // fallback：無法分享圖片就複製文案
          await navigator.clipboard.writeText(caption);
          alert("你的裝置不支援圖片分享，已幫你複製文案！");
        }

      } catch (err) {
        console.log(err);
        alert("分享失敗，請改用下載方式 ☔");
      }
    }
    function downloadResult() {
      const img = document.getElementById("resultImage");

      const a = document.createElement("a");
      a.href = img.src;
      a.download = `漂流傘_雨天人格.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
    function copyCaption() {
      const img = document.getElementById("resultImage");

      const captions = {
        storm: "我像暴雨一樣的情緒，你接得住嗎？☔",
        drizzle: "我是一場慢慢下的雨，不吵，但一直在。🌧️",
        cloudy: "我有點陰天，但還在努力變亮。☁️",
        shower: "忽晴忽雨，是我最真實的樣子。🌦️",
        sunny: "我看起來很晴天，但也曾下過雨。☀️"
      };

      // 從圖片路徑抓類型
      const src = img.src;
      const type = Object.keys(captions).find(t => src.includes(t));

      const text =
        `《漂流傘 ☔》
${captions[type] || "我正在雨裡整理自己"}

#漂流傘 #雨天人格 #心理測驗 #情緒天氣`;

      navigator.clipboard.writeText(text).then(() => {
        alert("IG文案已複製！");
      });
    }
    /* 初始化背景雨滴 (開場頁用) */
    function createRain() {
      const rain = document.querySelector(".rain");
      if (!rain) return;
      for (let i = 0; i < 60; i++) {
        const drop = document.createElement("span");
        drop.style.left = Math.random() * 100 + "%";
        drop.style.animationDuration = (0.4 + Math.random() * 0.5) + "s";
        drop.style.opacity = Math.random() * 0.7;
        drop.style.height = (12 + Math.random() * 12) + "px";
        rain.appendChild(drop);
      }
    }

    createRain();
    document.documentElement.classList.add("intro-mode");
    document.body.classList.add("intro-mode");
  </script>
</body>

</html>
